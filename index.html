<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#C2334D">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Тренажер «Р»</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap&subset=cyrillic,latin,latin-ext" rel="stylesheet">
<style>
:root{
  --bg:#F2F5F4; --card:#FFFFFF; --ink:#16302B; --muted:#5E7470;
  --accent:#C2334D; --accent-soft:#F9E3E8;
  --green:#3E7C6F; --green-soft:#E2EFEA;
  --amber:#B97E10; --amber-soft:#FAF0DA;
  --line:#DCE4E1;
  --disp:'Unbounded', system-ui, sans-serif;
  --body:'IBM Plex Sans', system-ui, sans-serif;
}
*{box-sizing:border-box; margin:0}
body{background:var(--bg); color:var(--ink); font-family:var(--body); font-size:16px; line-height:1.45; padding:16px 12px 60px}
.wrap{max-width:620px; margin:0 auto}

/* header */
header{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px; flex-wrap:wrap}
.logo{font-family:var(--disp); font-weight:700; font-size:20px; letter-spacing:.5px}
.logo .r{color:var(--accent)}
.headright{display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end}
.langsel{border:1px solid var(--line); background:var(--card); color:var(--muted); border-radius:20px; padding:7px 10px; font-family:var(--body); font-weight:600; font-size:13px; cursor:pointer}
.tabs{display:flex; gap:6px}
.tab{border:1px solid var(--line); background:var(--card); color:var(--muted); border-radius:20px; padding:7px 14px; font-family:var(--body); font-weight:600; font-size:14px; cursor:pointer}
.tab.active{background:var(--ink); color:#fff; border-color:var(--ink)}
.tab:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible{outline:2px solid var(--accent); outline-offset:2px}

/* day nav */
.daynav{display:flex; align-items:center; justify-content:space-between; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:10px 12px; margin-bottom:12px}
.daynav button{background:none; border:1px solid var(--line); border-radius:10px; width:38px; height:38px; font-size:18px; cursor:pointer; color:var(--ink)}
.daynav button:disabled{opacity:.3; cursor:default}
.daymeta{text-align:center}
.daymeta .dn{font-family:var(--disp); font-weight:700; font-size:17px}
.daymeta .dd{font-size:13px; color:var(--muted)}
.phasebadge{display:inline-block; font-size:12px; font-weight:600; border-radius:12px; padding:2px 10px; margin-top:3px}
.ph1{background:var(--amber-soft); color:var(--amber)}
.ph2{background:var(--accent-soft); color:var(--accent)}
.ph3{background:var(--green-soft); color:var(--green)}

/* exercise cards */
.card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px 16px; margin-bottom:10px}
.card.done{border-color:var(--green); background:var(--green-soft)}
.exhead{display:flex; align-items:flex-start; justify-content:space-between; gap:10px}
.exname{font-weight:600; font-size:16.5px}
.exdesc{color:var(--muted); font-size:14px; margin-top:4px}
.exdose{font-size:13px; font-weight:600; color:var(--accent); margin-top:4px}
.card.done .exdose{color:var(--green)}
.checkbtn{flex:none; width:30px; height:30px; border-radius:50%; border:2px solid var(--line); background:#fff; cursor:pointer; font-size:15px; color:transparent; line-height:1}
.card.done .checkbtn{background:var(--green); border-color:var(--green); color:#fff}

/* controls */
.ctrl{display:flex; align-items:center; gap:12px; margin-top:12px; flex-wrap:wrap}
.bigbtn{font-family:var(--body); font-weight:600; font-size:15px; border:none; border-radius:12px; padding:11px 18px; cursor:pointer}
.bigbtn.acc{background:var(--accent); color:#fff}
.bigbtn.ghost{background:none; border:1px solid var(--line); color:var(--ink)}
.count{font-family:var(--disp); font-weight:700; font-size:22px; min-width:74px; text-align:center}
.count small{font-size:12px; color:var(--muted); font-family:var(--body); font-weight:500; display:block}

/* timer ring — signature element */
.ring{position:relative; width:96px; height:96px; flex:none}
.ring svg{transform:rotate(-90deg)}
.ring .t{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:var(--disp); font-weight:700; font-size:22px}
.ripple{position:absolute; inset:0; border-radius:50%; border:2px solid var(--accent); opacity:0; pointer-events:none}
.running .ripple{animation:rip 1.2s ease-out infinite}
.running .ripple.r2{animation-delay:.6s}
@keyframes rip{0%{transform:scale(.85); opacity:.55}100%{transform:scale(1.28); opacity:0}}
@media (prefers-reduced-motion: reduce){.ripple, .recdot{animation:none !important}}

/* session log */
.log h3{font-family:var(--disp); font-weight:700; font-size:15px; margin-bottom:10px}
.viboptions{display:flex; gap:8px; flex-wrap:wrap}
.vib{border:1px solid var(--line); background:#fff; border-radius:20px; padding:8px 16px; font-weight:600; font-size:14px; cursor:pointer; color:var(--muted)}
.vib.sel-yes{background:var(--green); border-color:var(--green); color:#fff}
.vib.sel-partial{background:var(--amber); border-color:var(--amber); color:#fff}
.vib.sel-no{background:var(--ink); border-color:var(--ink); color:#fff}
textarea{width:100%; border:1px solid var(--line); border-radius:12px; padding:10px 12px; font-family:var(--body); font-size:15px; margin-top:10px; resize:vertical; min-height:64px; background:#fff; color:var(--ink)}
.savemsg{font-size:13px; color:var(--green); font-weight:600; margin-top:8px; min-height:18px}
.rec{margin-top:16px; padding-top:14px; border-top:1px solid var(--line)}
.rec h4{font-family:var(--disp); font-weight:700; font-size:14px; margin-bottom:8px}
.recrow{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
.recrow audio{max-width:100%; height:38px}
.recdot{width:12px; height:12px; border-radius:50%; background:var(--accent); flex:none; animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
a.bigbtn{text-decoration:none; display:inline-block}

/* progress */
.stats{display:flex; gap:10px; margin-bottom:12px}
.stat{flex:1; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px; text-align:center}
.stat .num{font-family:var(--disp); font-weight:700; font-size:26px}
.stat.acc .num{color:var(--accent)}
.stat.grn .num{color:var(--green)}
.stat .lbl{font-size:12.5px; color:var(--muted); margin-top:2px}
.gridwrap{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px}
.weekrow{display:flex; align-items:center; gap:6px; margin-bottom:6px}
.weeklbl{width:64px; font-size:12px; color:var(--muted); font-weight:600; flex:none}
.cell{flex:1; aspect-ratio:1; max-width:52px; border-radius:9px; border:1px solid var(--line); background:#fff; cursor:pointer; position:relative; font-size:11px; color:var(--muted); font-family:var(--body); padding:0}
.cell.done{background:var(--green); border-color:var(--green); color:#fff; font-weight:600}
.cell.partial{background:var(--amber); border-color:var(--amber); color:#fff; font-weight:600}
.cell.missed{background:var(--accent-soft); border-color:var(--accent-soft); color:var(--accent)}
.cell.today{outline:2px solid var(--ink); outline-offset:1px}
.legend{display:flex; gap:14px; flex-wrap:wrap; margin-top:12px; font-size:12.5px; color:var(--muted)}
.dot{display:inline-block; width:11px; height:11px; border-radius:3px; margin-right:5px; vertical-align:-1px}

/* settings */
.settings{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px 16px; margin-bottom:12px}
.settings label{font-weight:600; font-size:14px}
.settings input[type=date]{border:1px solid var(--line); border-radius:10px; padding:8px 10px; font-family:var(--body); font-size:15px; margin-left:8px; background:#fff; color:var(--ink)}
.hint{font-size:13px; color:var(--muted); margin-top:8px}
.io{display:flex; gap:10px; margin-top:12px; flex-wrap:wrap}
.io .bigbtn{font-size:14px; padding:9px 14px}
.warn{background:var(--accent-soft); border:1px solid #EFC4CE; color:var(--accent); border-radius:12px; padding:10px 14px; font-size:14px; margin-bottom:10px}
.hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo" id="logo"></div>
    <div class="headright">
      <select class="langsel" id="langSel" onchange="setLang(this.value)" aria-label="Мова / Jazyk / Language">
        <option value="uk">🇺🇦 Українська</option>
        <option value="sk">🇸🇰 Slovenčina</option>
        <option value="en">🇬🇧 English</option>
      </select>
      <div class="tabs">
        <button class="tab active" id="tabToday" onclick="setView('today')">Сьогодні</button>
        <button class="tab" id="tabProg" onclick="setView('progress')">Прогрес</button>
      </div>
    </div>
  </header>

  <div id="viewToday">
    <div class="settings" id="startPanel">
      <label><span id="startLabelText">Дата початку курсу:</span> <input type="date" id="startInput"></label>
      <div class="hint" id="startHint">Курс триває 56 днів (8 тижнів). Дату можна змінити будь-коли.</div>
      <div class="io">
        <button class="bigbtn ghost" id="exportBtn" onclick="exportData()">Експорт</button>
        <label class="bigbtn ghost" style="cursor:pointer"><span id="importBtn">Імпорт</span>
          <input type="file" accept="application/json,.json" onchange="importData(this)" hidden>
        </label>
      </div>
    </div>

    <div class="daynav">
      <button id="prevDay" aria-label="Попередній день" onclick="shiftDay(-1)">‹</button>
      <div class="daymeta">
        <div class="dn" id="dayTitle">День 1</div>
        <div class="dd" id="dayDate"></div>
        <span class="phasebadge" id="phaseBadge"></span>
      </div>
      <button id="nextDay" aria-label="Наступний день" onclick="shiftDay(1)">›</button>
    </div>

    <div id="vibWarn" class="warn hidden"></div>

    <div id="exList"></div>

    <div class="card log">
      <h3 id="summaryTitle">Підсумок дня</h3>
      <div style="font-size:14px; color:var(--muted); margin-bottom:8px" id="vibQuestion">Чи виходила вібрація кінчика язика?</div>
      <div class="viboptions" id="vibOpts">
        <button class="vib" data-v="yes" onclick="setVib('yes')">Так</button>
        <button class="vib" data-v="partial" onclick="setVib('partial')">Частково</button>
        <button class="vib" data-v="no" onclick="setVib('no')">Ні</button>
      </div>
      <textarea id="notes" placeholder="Нотатки…" onblur="saveNotes()"></textarea>
      <div class="savemsg" id="saveMsg"></div>
      <div class="rec">
        <h4 id="recTitle">Запис голосу</h4>
        <div id="recBox"></div>
        <div class="hint" id="recHint"></div>
        <div class="savemsg" id="recStatus" style="color:var(--accent)"></div>
      </div>
    </div>
  </div>

  <div id="viewProgress" class="hidden">
    <div class="stats">
      <div class="stat grn"><div class="num" id="stDone">0</div><div class="lbl" id="stDoneLbl">днів виконано</div></div>
      <div class="stat acc"><div class="num" id="stVib">0</div><div class="lbl" id="stVibLbl">днів з вібрацією</div></div>
      <div class="stat"><div class="num" id="stStreak">0</div><div class="lbl" id="stStreakLbl">поспіль зараз</div></div>
    </div>
    <div class="gridwrap" id="grid"></div>
    <div class="legend">
      <span><span class="dot" style="background:var(--green)"></span><span id="legDone"></span></span>
      <span><span class="dot" style="background:var(--amber)"></span><span id="legPartial"></span></span>
      <span><span class="dot" style="background:var(--accent-soft)"></span><span id="legMissed"></span></span>
      <span><span class="dot" style="background:#fff; border:1px solid var(--line)"></span><span id="legAhead"></span></span>
    </div>
    <div class="hint" id="gridHint" style="margin-top:10px"></div>
  </div>
</div>

function L(){ return I18N[state.lang] || I18N.uk; }

function phaseOfWeek(w){ return w<=2?1 : w<=4?2 : 3; }
function exercisesFor(week){
  const EX = L().EX, p = phaseOfWeek(week);
  if(p===1) return EX.gym;
  if(p===2) return EX.vibr;
  return week<=6 ? EX.auto1 : EX.auto2;
}

// ---------- state ----------
let state = { start: todayISO(), lang:'uk', days: {} };
let curDay = 1;
let saveTimer = null;

function todayISO(){ const d=new Date(); return d.toISOString().slice(0,10); }
function dateOfDay(n){ const d=new Date(state.start+'T00:00:00'); d.setDate(d.getDate()+n-1); return d; }
function fmtDate(d){ return d.toLocaleDateString(L().locale,{weekday:'short', day:'numeric', month:'long'}); }
function todayDayNum(){
  const s=new Date(state.start+'T00:00:00'), t=new Date(todayISO()+'T00:00:00');
  return Math.floor((t-s)/86400000)+1;
}
function dayRec(n){
  if(!state.days[n]) state.days[n] = {done:{}, vib:null, notes:'', prog:{}};
  return state.days[n];
}
function dayComplete(n){
  const rec = state.days[n]; if(!rec) return false;
  const week = Math.floor((n-1)/7)+1;
  return exercisesFor(week).every(e=>rec.done[e.id]);
}

// ---------- storage (localStorage — runs anywhere, incl. GitHub Pages) ----------
function load(){
  try{
    const v = localStorage.getItem('rtrainer:v1');
    if(v){ const s=JSON.parse(v); if(s && typeof s==='object') state = Object.assign({start:todayISO(), lang:'uk', days:{}}, s); }
  }catch(e){ /* перший запуск / first run — no data yet */ }
  if(!I18N[state.lang]) state.lang='uk';
}
function persist(msg){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    try{ localStorage.setItem('rtrainer:v1', JSON.stringify(state)); flashSave(msg||L().saved); }
    catch(e){ flashSave(L().saveErr); }
  }, 300);
}
function flashSave(t){
  const el=document.getElementById('saveMsg'); el.textContent=t;
  setTimeout(()=>{ if(el.textContent===t) el.textContent=''; }, 2500);
}

// ---------- audio ----------
let actx=null;
function beep(){
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(), g=actx.createGain();
    o.frequency.value=880; o.connect(g); g.connect(actx.destination);
    g.gain.setValueAtTime(.001, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(.25, actx.currentTime+.02);
    g.gain.exponentialRampToValueAtTime(.001, actx.currentTime+.5);
    o.start(); o.stop(actx.currentTime+.55);
  }catch(e){}
}

  stopAllTimers();
  state.lang=lang;
  applyLang();
  persist();
  const onToday = !document.getElementById('viewToday').classList.contains('hidden');
  if(onToday) renderToday(); else renderProgress();
}

// ---------- rendering: today ----------
const timers = {}; // exId -> {left, iv}

function renderToday(){
  const t=L();
  const week = Math.floor((curDay-1)/7)+1;
  const p = phaseOfWeek(week);
  document.getElementById('dayTitle').textContent = `${t.dayWord} ${curDay} · ${t.weekWord} ${week}`;
  document.getElementById('dayDate').textContent = fmtDate(dateOfDay(curDay));
  const b=document.getElementById('phaseBadge');
  b.textContent = t.phases[p]; b.className = 'phasebadge ph'+p;
  document.getElementById('prevDay').disabled = curDay<=1;
  document.getElementById('nextDay').disabled = curDay>=56;

  // warning: end of week 4, no vibration at all
  const warn = document.getElementById('vibWarn');
  let show=false;
  if(curDay>=28){
    const logged = Object.keys(state.days).filter(n=>n>=15 && n<=28 && state.days[n].vib);
    if(logged.length>=8 && logged.every(n=>state.days[n].vib==='no')) show=true;
  }
  warn.classList.toggle('hidden', !show);

  const rec = dayRec(curDay);
  const list = document.getElementById('exList');
  list.innerHTML='';
  exercisesFor(week).forEach(ex=>{
    const done = !!rec.done[ex.id];
    const card=document.createElement('div');
    card.className='card'+(done?' done':'');
    card.id='card-'+ex.id;
    let dose='';
    if(ex.type==='reps') dose=`${ex.target} ${ex.unit}`;
    else if(ex.type==='timer') dose=`${ex.sets} ${ex.unit}`;
    card.innerHTML = `
      <div class="exhead">
        <div>
          <div class="exname">${ex.name}</div>
          <div class="exdesc">${ex.desc}</div>
          ${dose?`<div class="exdose">${dose}</div>`:''}
        </div>
        <button class="checkbtn" aria-label="${t.checkAria}" onclick="toggleDone('${ex.id}')">✓</button>
      </div>
      <div class="ctrl" id="ctrl-${ex.id}"></div>`;
    list.appendChild(card);
    renderCtrl(ex, rec);
  });

  // vib + notes
  document.querySelectorAll('#vibOpts .vib').forEach(btn=>{
    btn.className='vib'+(rec.vib===btn.dataset.v?' sel-'+rec.vib:'');
  });
  document.getElementById('notes').value = rec.notes||'';
}

function renderCtrl(ex, rec){
  const t=L();
  const box=document.getElementById('ctrl-'+ex.id);
  if(!box) return;
  const prog = rec.prog[ex.id]||0;
  if(ex.type==='reps'){
    box.innerHTML = `
      <button class="bigbtn acc" onclick="incRep('${ex.id}',${ex.target})">${t.plus1}</button>
      <div class="count">${prog} / ${ex.target}<small>${ex.unit}</small></div>
      <button class="bigbtn ghost" onclick="resetProg('${ex.id}')">${t.reset}</button>`;
  } else if(ex.type==='timer'){
    const tm = timers[ex.id];
    const left = tm? tm.left : ex.sec;
    const frac = 1 - left/ex.sec;
    const C = 2*Math.PI*42;
    box.innerHTML = `
      <div class="ring ${tm?'running':''}" id="ring-${ex.id}">
        <svg width="96" height="96" viewBox="0 0 96 96">
          <circle cx="48" cy="48" r="42" fill="none" stroke="var(--line)" stroke-width="6"/>
          <circle cx="48" cy="48" r="42" fill="none" stroke="var(--accent)" stroke-width="6"
            stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${C*(1-frac)}"/>
        </svg>
        <div class="ripple"></div><div class="ripple r2"></div>
        <div class="t">${left}</div>
      </div>
      <div class="count">${prog} / ${ex.sets}<small>${t.setsWord}</small></div>
      <button class="bigbtn ${tm?'ghost':'acc'}" onclick="toggleTimer('${ex.id}',${ex.sec},${ex.sets})">${tm?t.stop:t.start}</button>`;
  } else {
    box.innerHTML = `<div class="exdesc" style="margin-top:0">${t.markDone}</div>`;
  }
}

function incRep(id, target){
  const rec=dayRec(curDay);
  rec.prog[id]=(rec.prog[id]||0)+1;
  if(rec.prog[id]>=target && !rec.done[id]){ rec.done[id]=true; beep(); }
  persist(); renderToday();
}
function resetProg(id){
  const rec=dayRec(curDay); rec.prog[id]=0; delete rec.done[id];
  persist(); renderToday();
}
function toggleDone(id){
  const rec=dayRec(curDay);
  if(rec.done[id]) delete rec.done[id]; else rec.done[id]=true;
  persist(); renderToday();
}
function toggleTimer(id, sec, sets){
  if(timers[id]){ clearInterval(timers[id].iv); delete timers[id]; renderToday(); return; }
  timers[id]={left:sec, iv:setInterval(()=>{
    const t=timers[id]; if(!t) return;
    t.left--;
    if(t.left<=0){
      clearInterval(t.iv); delete timers[id];
      beep();
      const rec=dayRec(curDay);
      rec.prog[id]=(rec.prog[id]||0)+1;
      if(rec.prog[id]>=sets) rec.done[id]=true;
      persist();
    }
    renderToday();
  },1000)};
  renderToday();
}
function stopAllTimers(){ Object.values(timers).forEach(t=>clearInterval(t.iv)); for(const k in timers) delete timers[k]; }

function setVib(v){
  const rec=dayRec(curDay);
  rec.vib = rec.vib===v? null : v;
  persist(); renderToday();
}
function saveNotes(){
  const rec=dayRec(curDay);
  rec.notes=document.getElementById('notes').value;
  persist();
}
function shiftDay(d){
  stopAllTimers();
  curDay=Math.min(56, Math.max(1, curDay+d));
  renderToday(); loadDayRec();
}

// ---------- rendering: progress ----------
function renderProgress(){
  const t=L();
  const td=todayDayNum();
  let done=0, vib=0;
  for(let n=1;n<=56;n++){
    if(dayComplete(n)) done++;
    const r=state.days[n];
    if(r && r.vib==='yes') vib++;
  }
  let streak=0;
  for(let n=Math.min(td,56); n>=1; n--){
    if(dayComplete(n)) streak++; else if(n<td) break; // today's unfinished day does not break the streak
  }
  document.getElementById('stDone').textContent=done;
  document.getElementById('stVib').textContent=vib;
  document.getElementById('stStreak').textContent=streak;

  const grid=document.getElementById('grid'); grid.innerHTML='';
  for(let w=1; w<=8; w++){
    const row=document.createElement('div'); row.className='weekrow';
    const lbl=document.createElement('div'); lbl.className='weeklbl';
    lbl.textContent=`${t.weekShort} ${w}`;
    row.appendChild(lbl);
    for(let d=1; d<=7; d++){
      const n=(w-1)*7+d;
      const c=document.createElement('button'); c.className='cell'; c.textContent=n;
      const r=state.days[n];
      const complete=dayComplete(n);
      const partial=r && !complete && (Object.keys(r.done).length>0 || r.vib);
      if(complete) c.classList.add('done');
      else if(partial) c.classList.add('partial');
      else if(n<td) c.classList.add('missed');
      if(n===td) c.classList.add('today');
      c.title=`${t.dayWord} ${n} · ${fmtDate(dateOfDay(n))}`;
      c.onclick=()=>{ curDay=n; setView('today'); };
      row.appendChild(c);
    }
    grid.appendChild(row);
  }
}

// ---------- voice recording (latest take persisted per day in IndexedDB) ----------
let rec = { mr:null, chunks:[], stream:null, url:null, blob:null, iv:null, secs:0, day:0 };
const REC_MAX = 30; // ponytail: cap seconds so a blob can't grow unbounded

// tiny IndexedDB wrapper: one store, blob keyed by day number. No IDB → calls reject, handled.
let _db=null;
function idb(){
  if(_db) return Promise.resolve(_db);
  return new Promise((res,rej)=>{
    if(!window.indexedDB) return rej(new Error('no idb'));
    const r=indexedDB.open('rtrainer',1);
    r.onupgradeneeded=()=>r.result.createObjectStore('rec');
    r.onsuccess=()=>{ _db=r.result; res(_db); };
    r.onerror=()=>rej(r.error);
  });
}
function idbPut(k,v){ return idb().then(db=>new Promise((res,rej)=>{ const t=db.transaction('rec','readwrite'); t.objectStore('rec').put(v,k); t.oncomplete=res; t.onerror=()=>rej(t.error); })); }
function idbGet(k){ return idb().then(db=>new Promise((res,rej)=>{ const t=db.transaction('rec','readonly'); const q=t.objectStore('rec').get(k); q.onsuccess=()=>res(q.result); q.onerror=()=>rej(q.error); })); }
function idbDel(k){ return idb().then(db=>new Promise((res,rej)=>{ const t=db.transaction('rec','readwrite'); t.objectStore('rec').delete(k); t.oncomplete=res; t.onerror=()=>rej(t.error); })); }

async function toggleRec(){
  if(rec.mr && rec.mr.state==='recording'){ stopRec(); return; }
  if(!navigator.mediaDevices || !window.MediaRecorder){ document.getElementById('recStatus').textContent=L().micDenied; return; }
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    document.getElementById('recStatus').textContent='';
    rec.stream=stream; rec.chunks=[]; rec.day=curDay;
    const mr=new MediaRecorder(stream); rec.mr=mr;
    mr.ondataavailable=e=>{ if(e.data && e.data.size) rec.chunks.push(e.data); };
    mr.onstop=()=>{
      clearInterval(rec.iv);
      stream.getTracks().forEach(tr=>tr.stop());
      const blob=new Blob(rec.chunks, {type: mr.mimeType||'audio/webm'});
      const day=rec.day;
      if(rec.url) URL.revokeObjectURL(rec.url);
      rec.blob=blob; rec.url=URL.createObjectURL(blob);
      rec.mr=null; rec.stream=null; rec.chunks=[];
      renderRec();
      idbPut(day, blob).then(()=>flashSave(L().saved)).catch(()=>{});
    };
    mr.start(); rec.secs=0;
    rec.iv=setInterval(()=>{ rec.secs++; if(rec.secs>=REC_MAX) stopRec(); else updateRecTime(); }, 1000);
    renderRec();
  }catch(e){ document.getElementById('recStatus').textContent=L().micDenied; }
}
function stopRec(){ if(rec.mr && rec.mr.state==='recording') rec.mr.stop(); }
function updateRecTime(){ const c=document.querySelector('#recBox .rectime'); if(c) c.textContent=rec.secs+'s'; }
function recExt(blob){ const m=(blob&&blob.type)||''; if(m.includes('mp4')||m.includes('mpeg'))return 'm4a'; if(m.includes('ogg'))return 'ogg'; return 'webm'; }

function abortLive(){ // stop capture WITHOUT saving (drop handler first, then stop)
  if(rec.mr){ rec.mr.onstop=null; if(rec.mr.state==='recording'){ try{rec.mr.stop()}catch(e){} } }
  if(rec.stream) rec.stream.getTracks().forEach(tr=>tr.stop());
  clearInterval(rec.iv);
  rec.mr=null; rec.stream=null; rec.chunks=[]; rec.iv=null; rec.secs=0;
}
function clearRecUI(){
  abortLive();
  if(rec.url) URL.revokeObjectURL(rec.url);
  rec.url=null; rec.blob=null;
  const st=document.getElementById('recStatus'); if(st) st.textContent='';
}
async function loadDayRec(){ // teardown, then load this day's saved take (if any)
  clearRecUI();
  try{ const blob=await idbGet(curDay); if(blob){ rec.blob=blob; rec.url=URL.createObjectURL(blob); } }catch(e){}
  renderRec();
}
async function deleteRec(){
  clearRecUI();
  try{ await idbDel(curDay); }catch(e){}
  renderRec();
}
function renderRec(){
  const t=L(), box=document.getElementById('recBox');
  if(!box) return;
  if(rec.mr && rec.mr.state==='recording'){
    box.innerHTML=`<div class="recrow"><span class="recdot"></span>
      <span class="count rectime" style="min-width:auto">${rec.secs}s</span>
      <button class="bigbtn acc" onclick="toggleRec()">${t.recStop}</button></div>`;
  } else if(rec.url){
    box.innerHTML=`<div class="recrow">
      <audio controls src="${rec.url}"></audio>
      <a class="bigbtn ghost" href="${rec.url}" download="r-day${curDay}.${recExt(rec.blob)}">${t.recDownload}</a>
      <button class="bigbtn ghost" onclick="toggleRec()">${t.recAgain}</button>
      <button class="bigbtn ghost" onclick="deleteRec()">${t.recDelete}</button></div>`;
  } else {
    box.innerHTML=`<div class="recrow"><button class="bigbtn acc" onclick="toggleRec()">${t.recStart}</button></div>`;
  }
}

// ---------- export / import (backup, share with a therapist) ----------
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='r-trainer-progress.json'; a.click();
  URL.revokeObjectURL(url);
  flashSave(L().saved);
}
function importData(input){
  const f=input.files&&input.files[0]; if(!f){ return; }
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const s=JSON.parse(reader.result);
      if(!s || typeof s!=='object' || typeof s.days!=='object') throw new Error('bad shape');
      state=Object.assign({start:todayISO(), lang:'uk', days:{}}, s);
      if(!I18N[state.lang]) state.lang='uk';
      stopAllTimers();
      persist(L().imported);
      applyLang();
      document.getElementById('startInput').value=state.start;
      curDay=Math.min(56, Math.max(1, todayDayNum()));
      setView('today');
    }catch(e){ flashSave(L().importErr); }
    input.value=''; // allow re-importing the same file
  };
  reader.readAsText(f);
}

// ---------- views ----------
function setView(v){
  stopAllTimers();
  document.getElementById('viewToday').classList.toggle('hidden', v!=='today');
  document.getElementById('viewProgress').classList.toggle('hidden', v!=='progress');
  document.getElementById('tabToday').classList.toggle('active', v==='today');
  document.getElementById('tabProg').classList.toggle('active', v==='progress');
  if(v==='today'){ renderToday(); loadDayRec(); } else { clearRecUI(); renderProgress(); }
}

// ---------- init ----------
(function(){
  load();
  applyLang();
  const inp=document.getElementById('startInput');
  inp.value=state.start;
  inp.onchange=()=>{ state.start=inp.value||todayISO(); persist(L().dateSaved); renderToday(); };
  curDay=Math.min(56, Math.max(1, todayDayNum()));
  renderToday();
  loadDayRec();
})();

// PWA: installable + offline. Registration failure (file://, no SW support) is harmless.
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
