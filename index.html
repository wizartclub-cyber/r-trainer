<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#f5f5f7">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Тренажер «Р»</title>
<style>
:root{
  --bg:#f5f5f7; --surface:#ffffff; --sunken:#fafafa;
  --text:#1d1d1f; --text-secondary:#6e6e73; --text-tertiary:#86868b;
  --line:rgba(0,0,0,0.10); --line-strong:rgba(0,0,0,0.18);
  --accent:#0071e3; --accent-text:#006ada; --accent-hover:#0077ed; --accent-soft:rgba(0,113,227,0.08);
  --success:#12805c; --success-soft:rgba(18,128,92,0.10);
  --warning:#8a5a00; --warning-soft:rgba(138,90,0,0.10);
  --danger:#b3261e; --danger-soft:rgba(179,38,30,0.10);
  --focus-ring:0 0 0 4px rgba(0,113,227,0.25);
  --radius-sm:6px; --radius:8px; --radius-lg:12px;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.04); --shadow:0 2px 8px rgba(0,0,0,0.06); --shadow-lg:0 12px 32px rgba(0,0,0,0.12);
  --ease:cubic-bezier(0.4,0,0.2,1); --dur-fast:120ms; --dur:200ms; --dur-slow:320ms;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Inter","Segoe UI",Roboto,sans-serif;
}
@media (prefers-reduced-motion: reduce){:root{--dur-fast:0ms; --dur:0ms; --dur-slow:0ms}}
*{box-sizing:border-box; margin:0}
body{background:var(--bg); color:var(--text); font-family:var(--font); font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased; padding:16px 12px 56px}
.wrap{max-width:600px; margin:0 auto}
:where(a,button,input,select,textarea):focus-visible{outline:none; box-shadow:var(--focus-ring)}
.ic{width:18px; height:18px; flex:none; display:inline-block; vertical-align:middle}

/* header */
header{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:20px; flex-wrap:wrap}
.logo{font-weight:600; font-size:20px; letter-spacing:-0.01em; color:var(--text)}
.headright{display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end}
.langsel{height:36px; border:1px solid var(--line-strong); background:var(--surface); color:var(--text); border-radius:var(--radius); padding:0 10px; font-family:var(--font); font-weight:500; font-size:13px; cursor:pointer}
.tabs{display:flex; gap:4px; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:2px}
.tab{border:none; background:none; color:var(--text-secondary); border-radius:var(--radius-sm); padding:0 12px; height:32px; font-family:var(--font); font-weight:500; font-size:14px; cursor:pointer; transition:background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease)}
.tab.active{background:var(--accent-soft); color:var(--accent-text)}

/* buttons */
.btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; height:40px; padding:0 16px; border-radius:var(--radius); border:1px solid transparent; background:none; font-family:var(--font); font-weight:500; font-size:15px; line-height:1; color:var(--text); cursor:pointer; text-decoration:none; transition:background var(--dur-fast) var(--ease), border-color var(--dur-fast) var(--ease)}
.btn:disabled{opacity:.4; cursor:not-allowed}
.btn.secondary{background:var(--surface); border-color:var(--line-strong); color:var(--text)}
.btn.secondary:hover:not(:disabled){background:var(--accent-soft)}
.btn.ghost{color:var(--accent-text)}
.btn.ghost:hover:not(:disabled){background:var(--accent-soft)}
.btn.danger{background:var(--surface); border-color:var(--danger); color:var(--danger)}
.btn.danger:hover:not(:disabled){background:var(--danger-soft)}
.btn .ic{width:18px; height:18px}

/* day nav */
.daynav{display:flex; align-items:center; justify-content:space-between; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow-sm); padding:12px; margin-bottom:12px}
.navbtn{display:inline-flex; align-items:center; justify-content:center; width:40px; height:40px; background:var(--surface); border:1px solid var(--line-strong); border-radius:var(--radius); color:var(--text); cursor:pointer; transition:background var(--dur-fast) var(--ease)}
.navbtn:hover:not(:disabled){background:var(--accent-soft)}
.navbtn:disabled{opacity:.4; cursor:not-allowed}
.daymeta{text-align:center}
.daymeta .dn{font-weight:600; font-size:17px; letter-spacing:-0.01em}
.daymeta .dd{font-size:13px; color:var(--text-secondary); margin-top:2px}
.phasebadge{display:inline-block; height:22px; line-height:20px; font-size:12px; font-weight:500; border-radius:var(--radius-sm); padding:0 8px; margin-top:6px; background:rgba(0,0,0,0.05); color:var(--text-secondary)}

/* exercise cards */
.card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow-sm); padding:16px; margin-bottom:12px}
.card.done{border-color:var(--success)}
.exhead{display:flex; align-items:flex-start; justify-content:space-between; gap:12px}
.exname{font-weight:600; font-size:17px}
.exdesc{color:var(--text-secondary); font-size:13px; margin-top:4px; line-height:1.45}
.exdose{font-size:13px; font-weight:500; color:var(--text-secondary); margin-top:8px; font-variant-numeric:tabular-nums}
.checkbtn{flex:none; display:inline-flex; align-items:center; justify-content:center; width:40px; height:40px; border-radius:var(--radius); border:1px solid var(--line-strong); background:var(--surface); cursor:pointer; color:transparent; transition:background var(--dur-fast) var(--ease), border-color var(--dur-fast) var(--ease)}
.card.done .checkbtn{background:var(--success); border-color:var(--success); color:#fff}

/* controls */
.ctrl{display:flex; align-items:center; gap:12px; margin-top:16px; flex-wrap:wrap}
.count{font-weight:600; font-size:20px; min-width:72px; text-align:center; font-variant-numeric:tabular-nums; color:var(--text)}
.count small{font-size:12px; color:var(--text-secondary); font-weight:400; display:block; font-variant-numeric:normal}

/* timer ring */
.ring{position:relative; width:96px; height:96px; flex:none}
.ring svg{transform:rotate(-90deg)}
.ring .t{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-weight:600; font-size:20px; font-variant-numeric:tabular-nums}

/* session log */
.log h3{font-weight:600; font-size:17px; margin-bottom:12px}
.qlabel{font-size:13px; color:var(--text-secondary); margin-bottom:8px}
.viboptions{display:flex; gap:8px; flex-wrap:wrap}
.vib{height:40px; padding:0 16px; border:1px solid var(--line-strong); background:var(--surface); border-radius:var(--radius); font-weight:500; font-size:14px; cursor:pointer; color:var(--text-secondary); transition:background var(--dur-fast) var(--ease), border-color var(--dur-fast) var(--ease)}
.vib.sel-yes{background:var(--success-soft); border-color:var(--success); color:var(--success)}
.vib.sel-partial{background:var(--warning-soft); border-color:var(--warning); color:var(--warning)}
.vib.sel-no{background:var(--danger-soft); border-color:var(--danger); color:var(--danger)}
textarea{width:100%; border:1px solid var(--line-strong); border-radius:var(--radius); padding:10px 12px; font-family:var(--font); font-size:15px; margin-top:12px; resize:vertical; min-height:96px; background:var(--surface); color:var(--text)}
.savemsg{font-size:13px; color:var(--success); font-weight:500; margin-top:8px; min-height:18px}
.rec{margin-top:16px; padding-top:16px; border-top:1px solid var(--line)}
.rec h4{font-weight:600; font-size:15px; margin-bottom:8px}
.recrow{display:flex; align-items:center; gap:8px; flex-wrap:wrap}
.recrow audio{max-width:100%; height:40px}
.recdot{width:10px; height:10px; border-radius:999px; background:var(--danger); flex:none; animation:pulse 1.2s var(--ease) infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@media (prefers-reduced-motion: reduce){.recdot{animation:none}}

/* progress */
.stats{display:flex; gap:12px; margin-bottom:12px}
.stat{flex:1; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow-sm); padding:16px 12px; text-align:center}
.stat .num{font-weight:600; font-size:28px; color:var(--text); font-variant-numeric:tabular-nums; letter-spacing:-0.01em}
.stat .lbl{font-size:12px; color:var(--text-secondary); margin-top:4px}
.gridwrap{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow-sm); padding:16px}
.weekrow{display:flex; align-items:center; gap:6px; margin-bottom:6px}
.weeklbl{width:52px; font-size:12px; color:var(--text-secondary); font-weight:500; flex:none}
.cell{flex:1; aspect-ratio:1; max-width:48px; border-radius:var(--radius-sm); border:1px solid var(--line); background:var(--surface); cursor:pointer; position:relative; font-size:12px; color:var(--text-secondary); font-family:var(--font); font-variant-numeric:tabular-nums; padding:0; transition:background var(--dur-fast) var(--ease)}
.cell:hover{background:var(--accent-soft)}
.cell.done{background:var(--success-soft); border-color:var(--success-soft); color:var(--success); font-weight:600}
.cell.partial{background:var(--warning-soft); border-color:var(--warning-soft); color:var(--warning); font-weight:600}
.cell.missed{background:var(--danger-soft); border-color:var(--danger-soft); color:var(--danger)}
.cell.today{outline:2px solid var(--accent); outline-offset:1px}
.cell .mic{position:absolute; top:1px; right:1px; width:11px; height:11px; line-height:0}
.cell .mic .ic{width:11px; height:11px}
.legend{display:flex; gap:12px 16px; flex-wrap:wrap; margin-top:16px; font-size:12px; color:var(--text-secondary)}
.legend .ic{width:12px; height:12px}
.dot{display:inline-block; width:10px; height:10px; border-radius:999px; margin-right:6px; vertical-align:-1px}

/* settings */
.settings{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow-sm); padding:16px; margin-bottom:12px}
.settings label{display:block}
#startLabelText{display:block; font-weight:500; font-size:12px; color:var(--text-secondary); margin-bottom:6px}
.settings input[type=date]{display:block; height:40px; border:1px solid var(--line-strong); border-radius:var(--radius); padding:0 12px; font-family:var(--font); font-size:15px; background:var(--surface); color:var(--text)}
.hint{font-size:12px; color:var(--text-secondary); margin-top:8px; line-height:1.45}
.io{display:flex; gap:8px; margin-top:16px; flex-wrap:wrap}
.warn{display:flex; gap:8px; background:var(--warning-soft); border:1px solid var(--warning); color:var(--warning); border-radius:var(--radius); padding:12px 14px; font-size:13px; margin-bottom:12px; line-height:1.45}
.hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo" id="logo"></div>
    <div class="headright">
      <select class="langsel" id="langSel" onchange="setLang(this.value)" aria-label="Мова / Jazyk / Language">
        <option value="uk">Українська</option>
        <option value="sk">Slovenčina</option>
        <option value="en">English</option>
      </select>
      <div class="tabs">
        <button class="tab active" id="tabToday" onclick="setView('today')">Сьогодні</button>
        <button class="tab" id="tabProg" onclick="setView('progress')">Прогрес</button>
      </div>
    </div>
  </header>

  <div id="viewToday">
    <div class="settings" id="startPanel">
      <label><span id="startLabelText">Дата початку курсу:</span> <input type="date" id="startInput"></label>
      <div class="hint" id="startHint">Курс триває 56 днів (8 тижнів). Дату можна змінити будь-коли.</div>
      <div class="io">
        <button class="btn secondary" id="exportBtn" onclick="exportData()">Експорт</button>
        <label class="btn secondary" style="cursor:pointer"><span id="importBtn">Імпорт</span>
          <input type="file" accept="application/json,.json" onchange="importData(this)" hidden>
        </label>
      </div>
    </div>

    <div class="daynav">
      <button class="navbtn" id="prevDay" aria-label="Попередній день" onclick="shiftDay(-1)"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg></button>
      <div class="daymeta">
        <div class="dn" id="dayTitle">День 1</div>
        <div class="dd" id="dayDate"></div>
        <span class="phasebadge" id="phaseBadge"></span>
      </div>
      <button class="navbtn" id="nextDay" aria-label="Наступний день" onclick="shiftDay(1)"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg></button>
    </div>

    <div id="vibWarn" class="warn hidden"></div>

    <div id="exList"></div>

    <div class="card log">
      <h3 id="summaryTitle">Підсумок дня</h3>
      <div class="qlabel" id="vibQuestion">Чи виходила вібрація кінчика язика?</div>
      <div class="viboptions" id="vibOpts">
        <button class="vib" data-v="yes" onclick="setVib('yes')">Так</button>
        <button class="vib" data-v="partial" onclick="setVib('partial')">Частково</button>
        <button class="vib" data-v="no" onclick="setVib('no')">Ні</button>
      </div>
      <textarea id="notes" placeholder="Нотатки…" onblur="saveNotes()"></textarea>
      <div class="savemsg" id="saveMsg"></div>
      <div class="rec">
        <h4 id="recTitle">Запис голосу</h4>
        <div id="recBox"></div>
        <div class="hint" id="recHint"></div>
        <div class="savemsg" id="recStatus" style="color:var(--danger)"></div>
      </div>
    </div>
  </div>

  <div id="viewProgress" class="hidden">
    <div class="stats">
      <div class="stat"><div class="num" id="stDone">0</div><div class="lbl" id="stDoneLbl">днів виконано</div></div>
      <div class="stat"><div class="num" id="stVib">0</div><div class="lbl" id="stVibLbl">днів з вібрацією</div></div>
      <div class="stat"><div class="num" id="stStreak">0</div><div class="lbl" id="stStreakLbl">поспіль зараз</div></div>
    </div>
    <div class="gridwrap" id="grid"></div>
    <div class="legend">
      <span><span class="dot" style="background:var(--success)"></span><span id="legDone"></span></span>
      <span><span class="dot" style="background:var(--warning)"></span><span id="legPartial"></span></span>
      <span><span class="dot" style="background:var(--danger)"></span><span id="legMissed"></span></span>
      <span><span class="dot" style="background:var(--surface); border:1px solid var(--line-strong)"></span><span id="legAhead"></span></span>
      <span><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><path d="M12 19v3"/></svg> <span id="legRec"></span></span>
    </div>
    <div class="hint" id="gridHint" style="margin-top:10px"></div>
  </div>
</div>

<script>
// ---------- i18n ----------
// Structural fields (type/target/sets/sec) are shared via stable ids; text is per-language.
const I18N = {
  uk:{
    htmlLang:'uk', locale:'uk-UA', title:'Тренажер «Р»',
    logo:['Тренажер «','Р','»'],
    tabToday:'Сьогодні', tabProg:'Прогрес',
    startLabel:'Дата початку курсу:',
    startHint:'Курс триває 56 днів (8 тижнів). Дату можна змінити будь-коли.',
    dayWord:'День', weekWord:'тиждень', weekShort:'Тиж.',
    prevAria:'Попередній день', nextAria:'Наступний день',
    vibWarn:"За 2 тижні фази вібрації прогресу немає. Рекомендація: перевірити під'язикову вуздечку в логопеда, перш ніж тренуватися далі.",
    summaryTitle:'Підсумок дня',
    vibQuestion:'Чи виходила вібрація кінчика язика?',
    vibYes:'Так', vibPartial:'Частково', vibNo:'Ні',
    notesPlaceholder:'Нотатки: що вдалося, що ні, скільки хвилин…',
    saved:'Збережено', saveErr:'Не вдалося зберегти — спробуйте ще раз', dateSaved:'Дату збережено',
    exportBtn:'Експорт', importBtn:'Імпорт', imported:'Прогрес завантажено', importErr:'Не вдалося прочитати файл',
    recTitle:'Запис голосу', recStart:'Записати', recStop:'Стоп', recAgain:'Ще раз', recDownload:'Завантажити', recDelete:'Видалити',
    recHint:'Останній запис зберігається для цього дня на цьому пристрої. Завантажте файл, щоб надіслати логопеду.', micDenied:'Немає доступу до мікрофона.',
    markDone:'Позначте галочкою, коли виконано.', checkAria:'Позначити виконаним',
    plus1:'+1', reset:'Скинути', start:'Старт', stop:'Стоп', setsWord:'підходів',
    statDone:'днів виконано', statVib:'днів з вібрацією', statStreak:'поспіль зараз',
    legDone:'тренування + вібрація/виконано', legPartial:'частково', legMissed:'пропущено', legAhead:'попереду', legRec:'є запис',

    phases:{1:'Фаза 1 · Гімнастика', 2:'Фаза 2 · Вібрація', 3:'Фаза 3 · Автоматизація'},
    EX:{
      gym:[
        {id:'konyachka', type:'reps', target:15, name:'«Конячка»', desc:'Цокайте язиком, присмоктуючи його до піднебіння. Нижня щелепа нерухома.', unit:'разів'},
        {id:'grybok', type:'timer', sets:10, sec:7, name:'«Грибок»', desc:'Присмокчіть язик до піднебіння і тримайте, розтягуючи вуздечку.', unit:'утримань по 7 с'},
        {id:'malyar', type:'reps', target:15, name:'«Маляр»', desc:'Кінчиком язика водіть по піднебінню вперед-назад, як пензлем.', unit:'разів'},
        {id:'baraban', type:'timer', sets:5, sec:10, name:'«Барабанщик»', desc:'Швидко повторюйте «д-д-д-д»: язик б\'є по горбках за верхніми зубами, рот відкритий, щелепа нерухома. Рука на горлі — горло не вібрує.', unit:'підходів по 10 с'}
      ],
      vibr:[
        {id:'warmup', type:'timer', sets:3, sec:10, name:'Розминка: «Барабанщик»', desc:'«Д-д-д-д» по альвеолах, рот відкритий.', unit:'підходів по 10 с'},
        {id:'cherezD', type:'reps', target:10, name:'Запуск через «Д»', desc:'Швидке «д-д-д» + різкий сильний видих → «др-р». Далі склади: дра, дро, дру, тра, тро, тру.', unit:'спроб'},
        {id:'mech', type:'timer', sets:5, sec:20, name:'Механічний запуск', desc:'Довге «жжж» або «д-д-д», і чистим пальцем чи ватною паличкою швидко рухайте під кінчиком язика вліво-вправо. Запам\'ятовуйте відчуття вібрації.', unit:'підходів по 20 с'},
        {id:'throat', type:'check', name:'Контроль горла', desc:'Під час усіх вправ тримайте руку на горлі: вібрувати має лише кінчик язика, не горло.'}
      ],
      auto1:[
        {id:'warmup2', type:'timer', sets:2, sec:15, name:'Розминка: «др-р», «тр-р»', desc:'Кілька запусків вібрації для розігріву.', unit:'підходи по 15 с'},
        {id:'sklady', type:'reps', target:10, name:'Склади', desc:'ра-ро-ру-ри, ар-ор-ур-ир. Чітко, з вібрацією.', unit:'повторів'},
        {id:'slova', type:'reps', target:10, name:'Слова', desc:'Р на початку: рак, риба, робота, рука. Р в середині: гора, перо, дорога, море.', unit:'повторів'},
        {id:'spol', type:'reps', target:10, name:'Сполучення', desc:'тра, дра, кра, бра → трава, дракон, крапля, брат, метро, відро.', unit:'повторів'}
      ],
      auto2:[

        {id:'skoro', type:'reps', target:10, name:'Скоромовки', desc:'«На горі Арарат росте великий виноград». «Риє землю сірий кріт — риє, риє огород». Спочатку повільно, потім швидко.', unit:'повторів'},
        {id:'read', type:'timer', sets:1, sec:300, name:'Читання вголос', desc:'Будь-який текст. Свідомо контролюйте кожне «Р».', unit:'× 5 хв'},
        {id:'speech', type:'check', name:'Контроль у мові', desc:'Сьогодні у розмовах свідомо стежте за «Р» хоча б у кількох фразах.'}

    }

function phaseOfWeek(w){ return w<=2?1 : w<=4?2 : 3; }
function exercisesFor(week){
  const EX = L().EX, p = phaseOfWeek(week);
  if(p===1) return EX.gym;
  if(p===2) return EX.vibr;
  return week<=6 ? EX.auto1 : EX.auto2;
}

// ---------- state ----------
let state = { start: todayISO(), lang:'uk', days: {} };
let curDay = 1;
let saveTimer = null;

function todayISO(){ const d=new Date(); return d.toISOString().slice(0,10); }
function dateOfDay(n){ const d=new Date(state.start+'T00:00:00'); d.setDate(d.getDate()+n-1); return d; }
function fmtDate(d){ return d.toLocaleDateString(L().locale,{weekday:'short', day:'numeric', month:'long'}); }
function todayDayNum(){
  const s=new Date(state.start+'T00:00:00'), t=new Date(todayISO()+'T00:00:00');
  return Math.floor((t-s)/86400000)+1;
}
function dayRec(n){
  if(!state.days[n]) state.days[n] = {done:{}, vib:null, notes:'', prog:{}};
  return state.days[n];
}
function dayComplete(n){
  const rec = state.days[n]; if(!rec) return false;
  const week = Math.floor((n-1)/7)+1;
  return exercisesFor(week).every(e=>rec.done[e.id]);
}

// ---------- storage (localStorage — runs anywhere, incl. GitHub Pages) ----------
function load(){
  try{
    const v = localStorage.getItem('rtrainer:v1');
    if(v){ const s=JSON.parse(v); if(s && typeof s==='object') state = Object.assign({start:todayISO(), lang:'uk', days:{}}, s); }
  }catch(e){ /* перший запуск / first run — no data yet */ }
  if(!I18N[state.lang]) state.lang='uk';
}
function persist(msg){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    try{ localStorage.setItem('rtrainer:v1', JSON.stringify(state)); flashSave(msg||L().saved); }
    catch(e){ flashSave(L().saveErr); }
  }, 300);
}
function flashSave(t){
  const el=document.getElementById('saveMsg'); el.textContent=t;
  setTimeout(()=>{ if(el.textContent===t) el.textContent=''; }, 2500);
}

// ---------- audio ----------
let actx=null;
function beep(){
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(), g=actx.createGain();
    o.frequency.value=880; o.connect(g); g.connect(actx.destination);
    g.gain.setValueAtTime(.001, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(.25, actx.currentTime+.02);
    g.gain.exponentialRampToValueAtTime(.001, actx.currentTime+.5);
    o.start(); o.stop(actx.currentTime+.55);
  }catch(e){}
}

function setLang(lang){
  if(!I18N[lang]) return;
  stopAllTimers();
  state.lang=lang;
  applyLang();
  persist();
  const onToday = !document.getElementById('viewToday').classList.contains('hidden');
  if(onToday) renderToday(); else renderProgress();
}

// ---------- rendering: today ----------
const timers = {}; // exId -> {left, iv}

function renderToday(){
  const t=L();
  const week = Math.floor((curDay-1)/7)+1;
  const p = phaseOfWeek(week);
  document.getElementById('dayTitle').textContent = `${t.dayWord} ${curDay} · ${t.weekWord} ${week}`;
  document.getElementById('dayDate').textContent = fmtDate(dateOfDay(curDay));
  const b=document.getElementById('phaseBadge');
  b.textContent = t.phases[p]; b.className = 'phasebadge ph'+p;
  document.getElementById('prevDay').disabled = curDay<=1;
  document.getElementById('nextDay').disabled = curDay>=56;

  // warning: end of week 4, no vibration at all
  const warn = document.getElementById('vibWarn');
  let show=false;
  if(curDay>=28){
    const logged = Object.keys(state.days).filter(n=>n>=15 && n<=28 && state.days[n].vib);
    if(logged.length>=8 && logged.every(n=>state.days[n].vib==='no')) show=true;
  }
  warn.classList.toggle('hidden', !show);

  const rec = dayRec(curDay);
  const list = document.getElementById('exList');
  list.innerHTML='';
  exercisesFor(week).forEach(ex=>{
    const done = !!rec.done[ex.id];
    const card=document.createElement('div');
    card.className='card'+(done?' done':'');
    card.id='card-'+ex.id;
    let dose='';
    if(ex.type==='reps') dose=`${ex.target} ${ex.unit}`;
    else if(ex.type==='timer') dose=`${ex.sets} ${ex.unit}`;
    card.innerHTML = `
      <div class="exhead">
        <div>
          <div class="exname">${ex.name}</div>
          <div class="exdesc">${ex.desc}</div>
          ${dose?`<div class="exdose">${dose}</div>`:''}
        </div>
        <button class="checkbtn" aria-label="${t.checkAria}" onclick="toggleDone('${ex.id}')">${IC.check}</button>
      </div>
      <div class="ctrl" id="ctrl-${ex.id}"></div>`;
    list.appendChild(card);
    renderCtrl(ex, rec);
  });

  // vib + notes
  document.querySelectorAll('#vibOpts .vib').forEach(btn=>{
    btn.className='vib'+(rec.vib===btn.dataset.v?' sel-'+rec.vib:'');
  });
  document.getElementById('notes').value = rec.notes||'';
}

function renderCtrl(ex, rec){
  const t=L();
  const box=document.getElementById('ctrl-'+ex.id);
  if(!box) return;
  const prog = rec.prog[ex.id]||0;
  if(ex.type==='reps'){
    box.innerHTML = `
      <button class="btn secondary" onclick="incRep('${ex.id}',${ex.target})">${t.plus1}</button>
      <div class="count">${prog} / ${ex.target}<small>${ex.unit}</small></div>
      <button class="btn ghost" onclick="resetProg('${ex.id}')">${t.reset}</button>`;
  } else if(ex.type==='timer'){
    const tm = timers[ex.id];
    const left = tm? tm.left : ex.sec;
    const frac = 1 - left/ex.sec;
    const C = 2*Math.PI*42;
    box.innerHTML = `
      <div class="ring" id="ring-${ex.id}">
        <svg width="96" height="96" viewBox="0 0 96 96">
          <circle cx="48" cy="48" r="42" fill="none" stroke="var(--line)" stroke-width="6"/>
          <circle cx="48" cy="48" r="42" fill="none" stroke="var(--accent)" stroke-width="6"
            stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${C*(1-frac)}"/>
        </svg>
        <div class="t">${left}</div>
      </div>
      <div class="count">${prog} / ${ex.sets}<small>${t.setsWord}</small></div>
      <button class="btn secondary" onclick="toggleTimer('${ex.id}',${ex.sec},${ex.sets})">${tm?IC.stop:IC.play}${tm?t.stop:t.start}</button>`;
  } else {
    box.innerHTML = `<div class="exdesc" style="margin-top:0">${t.markDone}</div>`;
  }
}

function incRep(id, target){
  const rec=dayRec(curDay);
  rec.prog[id]=(rec.prog[id]||0)+1;
  if(rec.prog[id]>=target && !rec.done[id]){ rec.done[id]=true; beep(); }
  persist(); renderToday();
}
function resetProg(id){
  const rec=dayRec(curDay); rec.prog[id]=0; delete rec.done[id];
  persist(); renderToday();
}
function toggleDone(id){
  const rec=dayRec(curDay);
  if(rec.done[id]) delete rec.done[id]; else rec.done[id]=true;
  persist(); renderToday();
}
function toggleTimer(id, sec, sets){
  if(timers[id]){ clearInterval(timers[id].iv); delete timers[id]; renderToday(); return; }
  timers[id]={left:sec, iv:setInterval(()=>{
    const t=timers[id]; if(!t) return;
    t.left--;
    if(t.left<=0){
      clearInterval(t.iv); delete timers[id];
      beep();
      const rec=dayRec(curDay);
      rec.prog[id]=(rec.prog[id]||0)+1;
      if(rec.prog[id]>=sets) rec.done[id]=true;
      persist();
    }
    renderToday();
  },1000)};
  renderToday();
}
function stopAllTimers(){ Object.values(timers).forEach(t=>clearInterval(t.iv)); for(const k in timers) delete timers[k]; }

function setVib(v){
  const rec=dayRec(curDay);
  rec.vib = rec.vib===v? null : v;
  persist(); renderToday();
}
function saveNotes(){
  const rec=dayRec(curDay);
  rec.notes=document.getElementById('notes').value;
  persist();
}
function shiftDay(d){
  stopAllTimers();
  curDay=Math.min(56, Math.max(1, curDay+d));
  renderToday(); loadDayRec();
}

// ---------- rendering: progress ----------
function renderProgress(){
  const t=L();
  const td=todayDayNum();
  let done=0, vib=0;
  for(let n=1;n<=56;n++){
    if(dayComplete(n)) done++;
    const r=state.days[n];
    if(r && r.vib==='yes') vib++;
  }
  let streak=0;
  for(let n=Math.min(td,56); n>=1; n--){
    if(dayComplete(n)) streak++; else if(n<td) break; // today's unfinished day does not break the streak
  }
  document.getElementById('stDone').textContent=done;
  document.getElementById('stVib').textContent=vib;
  document.getElementById('stStreak').textContent=streak;

  const grid=document.getElementById('grid'); grid.innerHTML='';
  for(let w=1; w<=8; w++){
    const row=document.createElement('div'); row.className='weekrow';
    const lbl=document.createElement('div'); lbl.className='weeklbl';
    lbl.textContent=`${t.weekShort} ${w}`;
    row.appendChild(lbl);
    for(let d=1; d<=7; d++){
      const n=(w-1)*7+d;
      const c=document.createElement('button'); c.className='cell'; c.textContent=n; c.dataset.day=n;
      const r=state.days[n];
      const complete=dayComplete(n);
      const partial=r && !complete && (Object.keys(r.done).length>0 || r.vib);
      if(complete) c.classList.add('done');
      else if(partial) c.classList.add('partial');
      else if(n<td) c.classList.add('missed');
      if(n===td) c.classList.add('today');
      c.title=`${t.dayWord} ${n} · ${fmtDate(dateOfDay(n))}`;
      c.onclick=()=>{ curDay=n; setView('today'); };
      row.appendChild(c);
    }
    grid.appendChild(row);
  }
  markRecDays(); // async: flag days that have a saved recording, once grid exists
}
async function markRecDays(){
  let keys;
  try{ keys=await idbKeys(); }catch(e){ return; }
  const set=new Set(keys.map(Number));
  document.querySelectorAll('#grid .cell').forEach(c=>{
    const has=set.has(Number(c.dataset.day));
    const mark=c.querySelector('.mic');
    if(has && !mark){ const m=document.createElement('span'); m.className='mic'; m.innerHTML=IC.mic; c.appendChild(m); }
    else if(!has && mark){ mark.remove(); }
  });
}

// ---------- voice recording (latest take persisted per day in IndexedDB) ----------
let rec = { mr:null, chunks:[], stream:null, url:null, blob:null, iv:null, secs:0, day:0 };
const REC_MAX = 30; // ponytail: cap seconds so a blob can't grow unbounded

// tiny IndexedDB wrapper: one store, blob keyed by day number. No IDB → calls reject, handled.
let _db=null;
function idb(){
  if(_db) return Promise.resolve(_db);
  return new Promise((res,rej)=>{
    if(!window.indexedDB) return rej(new Error('no idb'));
    const r=indexedDB.open('rtrainer',1);
    r.onupgradeneeded=()=>r.result.createObjectStore('rec');
    r.onsuccess=()=>{ _db=r.result; res(_db); };
    r.onerror=()=>rej(r.error);
  });
}
function idbPut(k,v){ return idb().then(db=>new Promise((res,rej)=>{ const t=db.transaction('rec','readwrite'); t.objectStore('rec').put(v,k); t.oncomplete=res; t.onerror=()=>rej(t.error); })); }
function idbGet(k){ return idb().then(db=>new Promise((res,rej)=>{ const t=db.transaction('rec','readonly'); const q=t.objectStore('rec').get(k); q.onsuccess=()=>res(q.result); q.onerror=()=>rej(q.error); })); }
function idbDel(k){ return idb().then(db=>new Promise((res,rej)=>{ const t=db.transaction('rec','readwrite'); t.objectStore('rec').delete(k); t.oncomplete=res; t.onerror=()=>rej(t.error); })); }
function idbKeys(){ return idb().then(db=>new Promise((res,rej)=>{ const t=db.transaction('rec','readonly'); const q=t.objectStore('rec').getAllKeys(); q.onsuccess=()=>res(q.result||[]); q.onerror=()=>rej(q.error); })); }

async function toggleRec(){
  if(rec.mr && rec.mr.state==='recording'){ stopRec(); return; }
  if(!navigator.mediaDevices || !window.MediaRecorder){ document.getElementById('recStatus').textContent=L().micDenied; return; }
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    document.getElementById('recStatus').textContent='';
    rec.stream=stream; rec.chunks=[]; rec.day=curDay;
    const mr=new MediaRecorder(stream); rec.mr=mr;
    mr.ondataavailable=e=>{ if(e.data && e.data.size) rec.chunks.push(e.data); };
    mr.onstop=()=>{
      clearInterval(rec.iv);
      stream.getTracks().forEach(tr=>tr.stop());
      const blob=new Blob(rec.chunks, {type: mr.mimeType||'audio/webm'});
      const day=rec.day;
      if(rec.url) URL.revokeObjectURL(rec.url);
      rec.blob=blob; rec.url=URL.createObjectURL(blob);
      rec.mr=null; rec.stream=null; rec.chunks=[];
      renderRec();
      idbPut(day, blob).then(()=>flashSave(L().saved)).catch(()=>{});
    };
    mr.start(); rec.secs=0;
    rec.iv=setInterval(()=>{ rec.secs++; if(rec.secs>=REC_MAX) stopRec(); else updateRecTime(); }, 1000);
    renderRec();
  }catch(e){ document.getElementById('recStatus').textContent=L().micDenied; }
}
function stopRec(){ if(rec.mr && rec.mr.state==='recording') rec.mr.stop(); }
function updateRecTime(){ const c=document.querySelector('#recBox .rectime'); if(c) c.textContent=rec.secs+'s'; }
function recExt(blob){ const m=(blob&&blob.type)||''; if(m.includes('mp4')||m.includes('mpeg'))return 'm4a'; if(m.includes('ogg'))return 'ogg'; return 'webm'; }

function abortLive(){ // stop capture WITHOUT saving (drop handler first, then stop)
  if(rec.mr){ rec.mr.onstop=null; if(rec.mr.state==='recording'){ try{rec.mr.stop()}catch(e){} } }
  if(rec.stream) rec.stream.getTracks().forEach(tr=>tr.stop());
  clearInterval(rec.iv);
  rec.mr=null; rec.stream=null; rec.chunks=[]; rec.iv=null; rec.secs=0;
}
function clearRecUI(){
  abortLive();
  if(rec.url) URL.revokeObjectURL(rec.url);
  rec.url=null; rec.blob=null;
  const st=document.getElementById('recStatus'); if(st) st.textContent='';
}
async function loadDayRec(){ // teardown, then load this day's saved take (if any)
  clearRecUI();
  try{ const blob=await idbGet(curDay); if(blob){ rec.blob=blob; rec.url=URL.createObjectURL(blob); } }catch(e){}
  renderRec();
}
async function deleteRec(){
  clearRecUI();
  try{ await idbDel(curDay); }catch(e){}
  renderRec();
}
function renderRec(){
  const t=L(), box=document.getElementById('recBox');
  if(!box) return;
  if(rec.mr && rec.mr.state==='recording'){
    box.innerHTML=`<div class="recrow"><span class="recdot"></span>
      <span class="count rectime" style="min-width:auto">${rec.secs}s</span>
      <button class="btn secondary" onclick="toggleRec()">${IC.stop}${t.recStop}</button></div>`;
  } else if(rec.url){
    box.innerHTML=`<div class="recrow">
      <audio controls src="${rec.url}"></audio>
      <a class="btn secondary" href="${rec.url}" download="r-day${curDay}.${recExt(rec.blob)}">${IC.download}${t.recDownload}</a>
      <button class="btn secondary" onclick="toggleRec()">${IC.mic}${t.recAgain}</button>
      <button class="btn danger" onclick="deleteRec()">${IC.trash}${t.recDelete}</button></div>`;
  } else {
    box.innerHTML=`<div class="recrow"><button class="btn secondary" onclick="toggleRec()">${IC.mic}${t.recStart}</button></div>`;
  }
}

// ---------- export / import (backup, share with a therapist) ----------
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='r-trainer-progress.json'; a.click();
  URL.revokeObjectURL(url);
  flashSave(L().saved);
}
function importData(input){
  const f=input.files&&input.files[0]; if(!f){ return; }
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const s=JSON.parse(reader.result);
      if(!s || typeof s!=='object' || typeof s.days!=='object') throw new Error('bad shape');
      state=Object.assign({start:todayISO(), lang:'uk', days:{}}, s);
      if(!I18N[state.lang]) state.lang='uk';
      stopAllTimers();
      persist(L().imported);
      applyLang();
      document.getElementById('startInput').value=state.start;
      curDay=Math.min(56, Math.max(1, todayDayNum()));
      setView('today');
    }catch(e){ flashSave(L().importErr); }
    input.value=''; // allow re-importing the same file
  };
  reader.readAsText(f);
}

// ---------- views ----------
function setView(v){
  stopAllTimers();
  document.getElementById('viewToday').classList.toggle('hidden', v!=='today');
  document.getElementById('viewProgress').classList.toggle('hidden', v!=='progress');
  document.getElementById('tabToday').classList.toggle('active', v==='today');
  document.getElementById('tabProg').classList.toggle('active', v==='progress');
  if(v==='today'){ renderToday(); loadDayRec(); } else { clearRecUI(); renderProgress(); }
}

// ---------- init ----------
(function(){
  load();
  applyLang();
  const inp=document.getElementById('startInput');
  inp.value=state.start;
  inp.onchange=()=>{ state.start=inp.value||todayISO(); persist(L().dateSaved); renderToday(); };
  curDay=Math.min(56, Math.max(1, todayDayNum()));
  renderToday();
  loadDayRec();
})();

// PWA: installable + offline. Registration failure (file://, no SW support) is harmless.
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
